<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="400" height="600" fill="#ffffff" />
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Activity: User Registration</text>
  
  <!-- Start -->
  <circle cx="200" cy="70" r="10" fill="#1e293b" />
  <line x1="200" y1="80" x2="200" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Submit Form -->
  <rect x="125" y="110" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Submit Registration Form</text>
  <line x1="200" y1="150" x2="200" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Validate -->
  <polygon points="200,180 240,210 200,240 160,210" fill="#f8fafc" stroke="#334155" stroke-width="2" />
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Valid Data?</text>
  
  <!-- Invalid Path -->
  <line x1="160" y1="210" x2="100" y2="210" stroke="#334155" stroke-width="2" />
  <line x1="100" y1="210" x2="100" y2="130" stroke="#334155" stroke-width="2" />
  <line x1="100" y1="130" x2="125" y2="130" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="130" y="205" font-family="Arial, sans-serif" font-size="10" fill="#ef4444">No</text>
  
  <!-- Valid Path -->
  <line x1="200" y1="240" x2="200" y2="270" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="210" y="255" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">Yes</text>
  
  <!-- Save Pending -->
  <rect x="125" y="270" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Save Pending User</text>
  <line x1="200" y1="310" x2="200" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Notify Admin -->
  <rect x="125" y="340" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Notify Admin</text>
  <line x1="200" y1="380" x2="200" y2="410" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Show Success -->
  <rect x="125" y="410" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Show Success Msg</text>
  <line x1="200" y1="450" x2="200" y2="480" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- End -->
  <circle cx="200" cy="495" r="15" fill="none" stroke="#1e293b" stroke-width="2" />
  <circle cx="200" cy="495" r="10" fill="#1e293b" />
</svg>
