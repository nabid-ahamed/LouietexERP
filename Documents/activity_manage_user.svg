<svg width="450" height="650" viewBox="0 0 450 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="450" height="650" fill="#ffffff" />
  <text x="225" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Activity: Manage Users (Admin)</text>
  
  <!-- Start -->
  <circle cx="225" cy="70" r="10" fill="#1e293b" />
  <line x1="225" y1="80" x2="225" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- View List -->
  <rect x="150" y="110" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="225" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Access User Management</text>
  <line x1="225" y1="150" x2="225" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Select Action -->
  <polygon points="225,180 285,210 225,240 165,210" fill="#f8fafc" stroke="#334155" stroke-width="2" />
  <text x="225" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Action?</text>
  
  <!-- Edit Path -->
  <line x1="165" y1="210" x2="100" y2="210" stroke="#334155" stroke-width="2" />
  <line x1="100" y1="210" x2="100" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="25" y="260" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="100" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Update User Info</text>
  
  <!-- Delete Path -->
  <line x1="285" y1="210" x2="350" y2="210" stroke="#334155" stroke-width="2" />
  <line x1="350" y1="210" x2="350" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="275" y="260" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="350" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Deactivate User</text>

  <!-- Approve Path -->
  <line x1="225" y1="240" x2="225" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="150" y="340" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="225" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Approve Pending User</text>

  <!-- Join -->
  <line x1="100" y1="300" x2="100" y2="420" stroke="#334155" stroke-width="2" />
  <line x1="350" y1="300" x2="350" y2="420" stroke="#334155" stroke-width="2" />
  <line x1="225" y1="380" x2="225" y2="420" stroke="#334155" stroke-width="2" />
  
  <line x1="100" y1="420" x2="350" y2="420" stroke="#334155" stroke-width="4" />
  <line x1="225" y1="420" x2="225" y2="460" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Log Activity -->
  <rect x="150" y="460" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="225" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Log Management Action</text>
  <line x1="225" y1="500" x2="225" y2="530" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- End -->
  <circle cx="225" cy="550" r="15" fill="none" stroke="#1e293b" stroke-width="2" />
  <circle cx="225" cy="550" r="10" fill="#1e293b" />
</svg>
