<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="400" height="600" fill="#ffffff" />
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Activity: Production Tracking</text>
  
  <circle cx="200" cy="70" r="10" fill="#1e293b" />
  <line x1="200" y1="80" x2="200" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="110" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Access Production List</text>
  <line x1="200" y1="150" x2="200" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="180" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Select Production Line</text>
  <line x1="200" y1="220" x2="200" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="250" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Log Daily Output</text>
  <line x1="200" y1="290" x2="200" y2="320" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="320" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Update Material Usage</text>
  <line x1="200" y1="360" x2="200" y2="390" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="390" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Calculate Completion %</text>
  <line x1="200" y1="430" x2="200" y2="460" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <circle cx="200" cy="500" r="15" fill="none" stroke="#1e293b" stroke-width="2" />
  <circle cx="200" cy="500" r="10" fill="#1e293b" />
</svg>
