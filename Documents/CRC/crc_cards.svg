<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="900" fill="#ffffff" />
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">CRC Cards for LouietexERP</text>

  <!-- Card Template Function/Macro represented here -->
  
  <!-- 1. ApplicationUser -->
  <g transform="translate(50, 80)">
    <rect width="400" height="200" rx="5" fill="#ffffff" stroke="#334155" stroke-width="2" />
    <rect width="400" height="40" rx="5" fill="#6b21a8" />
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Class: ApplicationUser</text>
