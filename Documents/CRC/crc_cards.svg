    <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Responsibilities</text>
    <text x="260" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Collaborators</text>
    <text x="10" y="80" font-family="Arial, sans-serif" font-size="10">- Manage identity &amp; access</text>
    <text x="10" y="95" font-family="Arial, sans-serif" font-size="10">- Track approval status</text>
    <text x="10" y="110" font-family="Arial, sans-serif" font-size="10">- Handle profile updates</text>
    <text x="260" y="80" font-family="Arial, sans-serif" font-size="10">- IdentityRole</text>
