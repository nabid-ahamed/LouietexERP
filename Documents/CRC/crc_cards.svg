    <rect width="400" height="40" rx="5" fill="#6b21a8" />
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Class: Inventory</text>
    <line x1="250" y1="40" x2="250" y2="200" stroke="#cbd5e1" />
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Responsibilities</text>
    <text x="260" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Collaborators</text>
    <text x="10" y="80" font-family="Arial, sans-serif" font-size="10">- Track material stock levels</text>
    <text x="10" y="95" font-family="Arial, sans-serif" font-size="10">- Provide low stock alerts</text>
    <text x="10" y="110" font-family="Arial, sans-serif" font-size="10">- Manage supplier data</text>
    <text x="260" y="80" font-family="Arial, sans-serif" font-size="10">- Production</text>
    <text x="260" y="95" font-family="Arial, sans-serif" font-size="10">- Order</text>
  </g>

  <!-- 6. Employee -->
