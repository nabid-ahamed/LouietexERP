<svg width="1200" height="1100" viewBox="0 0 1200 1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="assoc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#334155" />
    </marker>
    <marker id="inherit" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="white" stroke="#334155" />
    </marker>
  </defs>

  <rect width="1200" height="1100" fill="#ffffff" />
  <text x="600" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">LouietexERP: Fully Interconnected Class Diagram</text>

  <!-- IdentityUser (Base) -->
  <g transform="translate(450, 80)">
    <rect width="300" height="80" fill="#e2e8f0" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">IdentityUser</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : string [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">UserName : string</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Email : string</text>
  </g>

  <!-- ApplicationUser -->
  <g transform="translate(450, 220)">
    <rect width="300" height="180" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">ApplicationUser</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">FullName : string</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">IsApproved : bool</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">ProfilePicturePath : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">RegistrationDate : DateTime</text>
    <line x1="0" y1="100" x2="300" y2="100" stroke="#cbd5e1" />
    <text x="10" y="120" font-family="Arial, sans-serif" font-size="10">Inherits IdentityUser</text>
    <text x="10" y="135" font-family="Arial, sans-serif" font-size="10">Orders : ICollection&lt;Order&gt;</text>
    <text x="10" y="150" font-family="Arial, sans-serif" font-size="10">QCInspections : ICollection&lt;QC&gt;</text>
  </g>
  <line x1="600" y1="220" x2="600" y2="160" stroke="#334155" stroke-dasharray="5,5" marker-end="url(#inherit)" />

  <!-- Order -->
  <g transform="translate(50, 220)">
    <rect width="250" height="180" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="250" height="25" fill="#6b21a8" />
    <text x="125" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Order</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">BuyerName : string</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">StyleCode : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">DeliveryDate : DateTime</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Status : string</text>
    <line x1="0" y1="115" x2="250" y2="115" stroke="#cbd5e1" />
    <text x="10" y="130" font-family="Arial, sans-serif" font-size="10">Productions : ICollection</text>
  </g>
  <line x1="450" y1="310" x2="300" y2="310" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

  <!-- Production -->
  <g transform="translate(450, 500)">
    <rect width="300" height="200" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Production</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">OrderId : int [FK]</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">LineNumber : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">ActualOutput : int</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">TargetQuantity : int</text>
    <text x="10" y="120" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Status : string</text>
    <line x1="0" y1="130" x2="300" y2="130" stroke="#cbd5e1" />
    <text x="10" y="145" font-family="Arial, sans-serif" font-size="10">Order : Order</text>
    <text x="10" y="160" font-family="Arial, sans-serif" font-size="10">QCInspections : ICollection</text>
  </g>
  <line x1="175" y1="400" x2="450" y2="550" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

  <!-- QCInspection -->
  <g transform="translate(850, 500)">
    <rect width="300" height="200" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">QCInspection</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">ProductionId : int [FK]</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">CheckedByUserId : string [FK]</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">DefectCount : int</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">QCStatus : string</text>
    <line x1="0" y1="115" x2="300" y2="115" stroke="#cbd5e1" />
    <text x="10" y="130" font-family="Arial, sans-serif" font-size="10">Production : Production</text>
    <text x="10" y="145" font-family="Arial, sans-serif" font-size="10">CheckedByUser : ApplicationUser</text>
  </g>
  <line x1="750" y1="600" x2="850" y2="600" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />
  <line x1="1000" y1="500" x2="700" y2="400" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

  <!-- ProfileRequest -->
  <g transform="translate(850, 220)">
    <rect width="300" height="200" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">ProfileRequest</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">UserId : string [FK]</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Status : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">IsProcessed : bool</text>
    <line x1="0" y1="115" x2="300" y2="115" stroke="#cbd5e1" />
    <text x="10" y="130" font-family="Arial, sans-serif" font-size="10">User : ApplicationUser</text>
  </g>
  <line x1="850" y1="310" x2="750" y2="310" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

  <!-- Employee -->
  <g transform="translate(50, 750)">
    <rect width="250" height="150" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="250" height="25" fill="#6b21a8" />
    <text x="125" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Employee</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">UserId : string? [FK]</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">FullName : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Department : string</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Role : string</text>
    <line x1="0" y1="115" x2="250" y2="115" stroke="#cbd5e1" />
    <text x="10" y="130" font-family="Arial, sans-serif" font-size="10">User : ApplicationUser?</text>
  </g>
  <line x1="175" y1="750" x2="500" y2="400" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />
  <line x1="300" y1="825" x2="500" y2="700" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

  <!-- Inventory -->
  <g transform="translate(450, 800)">
    <rect width="300" height="150" fill="#ffffff" stroke="#334155" stroke-width="1" />
    <rect width="300" height="25" fill="#6b21a8" />
    <text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Inventory</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Id : int [PK]</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Name : string</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Category : string</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Quantity : int</text>
    <line x1="0" y1="100" x2="300" y2="100" stroke="#cbd5e1" />
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="10">UsedIn : ICollection&lt;Production&gt;</text>
  </g>
  <line x1="600" y1="800" x2="600" y2="700" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />
  <line x1="450" y1="875" x2="175" y2="400" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />
  <line x1="750" y1="875" x2="1000" y2="700" stroke="#334155" stroke-width="1" marker-end="url(#assoc)" />

</svg>
