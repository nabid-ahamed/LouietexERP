<svg width="800" height="900" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="dasharrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="800" height="900" fill="#ffffff" />
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Sequence Diagram: Production Record Creation</text>

  <!-- Lifelines -->
  <g transform="translate(100, 80)">
    <rect x="-40" y="0" width="80" height="30" fill="#f1f5f9" stroke="#334155" />
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Manager</text>
    <line x1="0" y1="30" x2="0" y2="800" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(250, 80)">
    <rect x="-50" y="0" width="100" height="30" fill="#f1f5f9" stroke="#334155" />
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Web UI</text>
    <line x1="0" y1="30" x2="0" y2="800" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(420, 80)">
    <rect x="-60" y="0" width="120" height="30" fill="#f1f5f9" stroke="#334155" />
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">ProdController</text>
    <line x1="0" y1="30" x2="0" y2="800" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(600, 80)">
    <rect x="-60" y="0" width="120" height="30" fill="#f1f5f9" stroke="#334155" />
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">DbContext</text>
    <line x1="0" y1="30" x2="0" y2="800" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(750, 80)">
    <rect x="-40" y="0" width="80" height="30" fill="#f1f5f9" stroke="#334155" />
    <text y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Database</text>
    <line x1="0" y1="30" x2="0" y2="800" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <!-- Activation Bars -->
  <rect x="95" y="120" width="10" height="660" fill="#cbd5e1" stroke="#334155" />
  <rect x="245" y="130" width="10" height="640" fill="#cbd5e1" stroke="#334155" />
  <rect x="415" y="140" width="10" height="610" fill="#cbd5e1" stroke="#334155" />
  <rect x="595" y="160" width="10" height="150" fill="#cbd5e1" stroke="#334155" />
  <rect x="595" y="520" width="10" height="150" fill="#cbd5e1" stroke="#334155" />

  <!-- Messages -->
  <!-- 1 -->
  <line x1="105" y1="140" x2="245" y2="140" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="175" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Access Create View</text>

  <!-- 2 -->
  <line x1="255" y1="160" x2="415" y2="160" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="335" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">GET Create()</text>

  <!-- 3 -->
  <line x1="425" y1="180" x2="595" y2="180" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="510" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">_context.Orders.ToList()</text>

  <!-- 4 -->
  <line x1="605" y1="200" x2="750" y2="200" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="677" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">SELECT * FROM Orders</text>

  <!-- 5 return -->
  <line x1="750" y1="230" x2="605" y2="230" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="677" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Dataset</text>

  <!-- 6 return -->
  <line x1="595" y1="260" x2="425" y2="260" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="510" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">List&lt;Order&gt;</text>

  <!-- 7 return -->
  <line x1="415" y1="290" x2="255" y2="290" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="335" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Render(CreateViewModel)</text>

  <!-- 8 -->
  <line x1="245" y1="320" x2="105" y2="320" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="175" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Show Form</text>

  <!-- 9 Submit -->
  <line x1="105" y1="480" x2="245" y2="480" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="175" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Submit Data</text>

  <!-- 10 POST -->
  <line x1="255" y1="500" x2="415" y2="500" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="335" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">POST Create(Model)</text>

  <!-- 11 Validation -->
  <path d="M425,520 C460,520 460,550 425,550" fill="none" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="470" y="540" font-family="Arial, sans-serif" font-size="9">ModelState.IsValid</text>

  <!-- 12 Add -->
  <line x1="425" y1="570" x2="595" y2="570" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="510" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">_context.Add(record)</text>

  <!-- 13 SQL -->
  <line x1="605" y1="590" x2="750" y2="590" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="677" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">INSERT INTO Productions</text>

  <!-- 14 commit -->
  <line x1="750" y1="620" x2="605" y2="620" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="677" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">OK</text>

  <!-- 15 return -->
  <line x1="595" y1="650" x2="425" y2="650" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="510" y="645" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Success</text>

  <!-- 16 Redirect -->
  <line x1="415" y1="720" x2="255" y2="720" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="335" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">RedirectToIndex()</text>

  <!-- 17 Finish -->
  <line x1="245" y1="750" x2="105" y2="750" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="175" y="745" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update UI List</text>

</svg>
