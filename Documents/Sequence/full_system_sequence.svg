<svg width="1000" height="1500" viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
    <marker id="dasharrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1000" height="1500" fill="#ffffff" />
  <text x="500" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Full System Sequence Diagram: End-to-End ERP Lifecycle</text>

  <!-- Lifelines -->
  <g transform="translate(100, 100)">
    <rect x="-45" y="0" width="90" height="40" fill="#f1f5f9" stroke="#334155" />
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Admin</text>
    <line x1="0" y1="40" x2="0" y2="1400" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(250, 100)">
    <rect x="-45" y="0" width="90" height="40" fill="#f1f5f9" stroke="#334155" />
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold">QC Inspector</text>
    <line x1="0" y1="40" x2="0" y2="1400" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(450, 100)">
    <rect x="-60" y="0" width="120" height="40" fill="#f1f5f9" stroke="#334155" />
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Web Interface</text>
    <line x1="0" y1="40" x2="0" y2="1400" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(700, 100)">
    <rect x="-60" y="0" width="120" height="40" fill="#f1f5f9" stroke="#334155" />
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Controllers</text>
    <line x1="0" y1="40" x2="0" y2="1400" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <g transform="translate(900, 100)">
    <rect x="-50" y="0" width="100" height="40" fill="#f1f5f9" stroke="#334155" />
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SQL Database</text>
    <line x1="0" y1="40" x2="0" y2="1400" stroke="#334155" stroke-dasharray="5,5" />
  </g>

  <!-- Section 1: Staff Management -->
  <rect x="50" y="150" width="900" height="200" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="5,5" />
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#64748b">Staff Onboarding</text>
  
  <line x1="100" y1="200" x2="450" y2="200" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="275" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Create Employee</text>
  
  <line x1="450" y1="230" x2="700" y2="230" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="575" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">EmployeesController.Post()</text>

  <line x1="700" y1="260" x2="900" y2="260" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="800" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">INSERT Employee</text>

  <line x1="900" y1="290" x2="700" y2="290" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="800" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Success</text>

  <!-- Section 2: Order Management -->
  <rect x="50" y="380" width="900" height="250" fill="#f0f9ff" stroke="#bae6fd" stroke-dasharray="5,5" />
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">Order Lifecycle</text>

  <line x1="100" y1="430" x2="450" y2="430" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="275" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Place Buyer Order</text>

  <line x1="450" y1="460" x2="700" y2="460" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="575" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">OrdersController.Create()</text>

  <line x1="700" y1="490" x2="900" y2="490" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="800" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">COMMIT Order Transaction</text>

  <line x1="900" y1="520" x2="700" y2="520" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="800" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Order Confirmed</text>

  <line x1="700" y1="550" x2="450" y2="550" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="575" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update Dashboard UI</text>

  <!-- Section 3: Production Flow -->
  <rect x="50" y="660" width="900" height="250" fill="#fdf2f7" stroke="#fbcfe8" stroke-dasharray="5,5" />
  <text x="60" y="680" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">Manufacturing Flow</text>

  <line x1="100" y1="710" x2="450" y2="710" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="275" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Start Production Line</text>

  <line x1="450" y1="740" x2="700" y2="740" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="575" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">ProductionsController.Init()</text>

  <line x1="700" y1="770" x2="900" y2="770" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="800" y="765" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Log Production Start</text>

  <line x1="900" y1="800" x2="700" y2="800" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="800" y="795" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Production Running</text>

  <line x1="700" y1="830" x2="450" y2="830" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="575" y="825" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update Real-time Charts</text>

  <!-- Section 4: QC & Inspection -->
  <rect x="50" y="940" width="900" height="250" fill="#f0fdf4" stroke="#bbf7d0" stroke-dasharray="5,5" />
  <text x="60" y="960" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">Quality Assurance</text>

  <line x1="250" y1="990" x2="450" y2="990" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="350" y="985" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Perform Batch Inspection</text>

  <line x1="450" y1="1020" x2="700" y2="1020" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="575" y="1015" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">QCController.RecordResult()</text>

  <line x1="700" y1="1050" x2="900" y2="1050" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="800" y="1045" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update Batch Quality Status</text>

  <line x1="900" y1="1080" x2="700" y2="1080" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="800" y="1075" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">QC Passed / Failed</text>

  <!-- Section 5: Inventory & Fulfillment -->
  <rect x="50" y="1220" width="900" height="150" fill="#fffbeb" stroke="#fde68a" stroke-dasharray="5,5" />
  <text x="60" y="1240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309">Inventory Fulfillment</text>

  <line x1="700" y1="1270" x2="900" y2="1270" stroke="#334155" stroke-width="1" marker-end="url(#arrowhead)" />
  <text x="800" y="1265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Deduct Raw Materials</text>

  <line x1="900" y1="1300" x2="700" y2="1300" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="800" y="1295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Inventory Updated</text>

  <line x1="700" y1="1330" x2="450" y2="1330" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#dasharrow)" />
  <text x="575" y="1325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Final Dashboard Analytics Ready</text>

</svg>
