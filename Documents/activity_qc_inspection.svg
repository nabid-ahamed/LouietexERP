<svg width="400" height="650" viewBox="0 0 400 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="400" height="650" fill="#ffffff" />
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Activity: QC Inspection</text>
  
  <circle cx="200" cy="70" r="10" fill="#1e293b" />
  <line x1="200" y1="80" x2="200" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="110" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Select Production Batch</text>
  <line x1="200" y1="150" x2="200" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="180" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Inspect Items</text>
  <line x1="200" y1="220" x2="200" y2="250" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="250" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Enter Fault Counts</text>
  <line x1="200" y1="290" x2="200" y2="320" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <polygon points="200,320 250,350 200,380 150,350" fill="#f8fafc" stroke="#334155" stroke-width="2" />
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Pass QC?</text>
  
  <line x1="150" y1="350" x2="80" y2="350" stroke="#334155" stroke-width="2" />
  <line x1="80" y1="350" x2="80" y2="400" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="20" y="400" width="120" height="40" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
  <text x="80" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">Mark for Rework</text>
  
  <line x1="250" y1="350" x2="320" y2="350" stroke="#334155" stroke-width="2" />
  <line x1="320" y1="350" x2="320" y2="400" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="260" y="400" width="120" height="40" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
  <text x="320" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">Mark as Approved</text>
  
  <line x1="80" y1="440" x2="80" y2="490" stroke="#334155" stroke-width="2" />
  <line x1="320" y1="440" x2="320" y2="490" stroke="#334155" stroke-width="2" />
  <line x1="80" y1="490" x2="320" y2="490" stroke="#334155" stroke-width="4" />
  
  <line x1="200" y1="490" x2="200" y2="530" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="125" y="530" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Save Inspection Log</text>
  
  <circle cx="200" cy="610" r="15" fill="none" stroke="#1e293b" stroke-width="2" />
  <circle cx="200" cy="610" r="10" fill="#1e293b" />
</svg>
