<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="600" height="600" fill="#ffffff" />
  <line x1="200" y1="0" x2="200" y2="600" stroke="#334155" stroke-width="2" />
  <line x1="400" y1="0" x2="400" y2="600" stroke="#334155" stroke-width="2" />
  <rect x="0" y="0" width="600" height="40" fill="#ffffff" stroke="#334155" stroke-width="2" />
  <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">System</text>
  <text x="300" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Admin / Auth</text>
  <text x="500" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">User / Employee</text>

  <ellipse cx="500" cy="70" rx="30" ry="15" fill="#64748b" />
  <text x="500" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Start</text>
  <line x1="500" y1="85" x2="500" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="425" y="100" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="500" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Request Profile View</text>
  <line x1="425" y1="120" x2="175" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="25" y="100" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Validate Session</text>
  <line x1="100" y1="140" x2="100" y2="180" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <polygon points="100,180 160,210 100,240 40,190" fill="#fef9c3" stroke="#854d0e" stroke-width="1" />
  <text x="100" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10"">Auth?</text>

  <!-- Unauthorized -->
  <line x1="160" y1="210" x2="425" y2="210" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="300" y="205" font-family="Arial, sans-serif" font-size="8">No</text>
  <rect x="425" y="190" width="150" height="40" fill="#fef2f2" stroke="#ef4444" stroke-width="1" />
  <text x="500" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Redirect to Login</text>

  <!-- Authorized -->
  <line x1="100" y1="240" x2="100" y2="280" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="105" y="260" font-family="Arial, sans-serif" font-size="8">Yes</text>
  <rect x="25" y="280" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Fetch User Profile</text>
  <line x1="100" y1="320" x2="100" y2="380" stroke="#334155" stroke-width="1.5" />
  <line x1="100" y1="380" x2="425" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="425" y="360" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="500" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">View Profile Info</text>
</svg>
