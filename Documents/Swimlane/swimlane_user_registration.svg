<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  
  <rect width="600" height="800" fill="#ffffff" />
  
  <!-- Lanes -->
  <line x1="200" y1="0" x2="200" y2="800" stroke="#334155" stroke-width="2" />
  <line x1="400" y1="0" x2="400" y2="800" stroke="#334155" stroke-width="2" />
  <rect x="0" y="0" width="600" height="40" fill="#ffffff" stroke="#334155" stroke-width="2" />
  
  <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">System</text>
  <text x="300" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Admin / Manager</text>
  <text x="500" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">User / Employee</text>

  <!-- Flow: Start -->
  <ellipse cx="500" cy="70" rx="30" ry="15" fill="#64748b" />
  <text x="500" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Start</text>
  <line x1="500" y1="85" x2="500" y2="100" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- User: Select Role & Fill -->
  <rect x="425" y="100" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="500" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Fill Registration Form</text>
  <line x1="500" y1="140" x2="500" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- User: Submit -->
  <rect x="425" y="170" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="500" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Submit Form</text>
  <line x1="425" y1="190" x2="160" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- System: Validate -->
  <polygon points="100,160 160,190 100,220 40,190" fill="#fef9c3" stroke="#854d0e" stroke-width="1" />
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Validate Data</text>
  
  <!-- Invalid Path -->
  <line x1="100" y1="160" x2="100" y2="120" stroke="#334155" stroke-width="1.5" />
  <line x1="100" y1="120" x2="425" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="105" y="150" font-family="Arial, sans-serif" font-size="8">Invalid</text>

  <!-- Valid Path -->
  <line x1="100" y1="220" x2="100" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="105" y="240" font-family="Arial, sans-serif" font-size="8">Valid</text>

  <!-- System: Store Pending -->
  <rect x="25" y="250" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Store 'Pending' Record</text>
  <line x1="100" y1="290" x2="100" y2="330" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- System: Notify Admin -->
  <rect x="25" y="330" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Notify Admin</text>
  <line x1="175" y1="350" x2="225" y2="350" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Admin: Review -->
  <rect x="225" y="330" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Review Request</text>
  <line x1="300" y1="370" x2="300" y2="400" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Admin: Decision -->
  <polygon points="300,400 360,430 300,460 240,430" fill="#fef9c3" stroke="#854d0e" stroke-width="1" />
  <text x="300" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Decision</text>

  <!-- Approved Path -->
  <line x1="240" y1="430" x2="160" y2="430" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="190" y="425" font-family="Arial, sans-serif" font-size="8">Approved</text>
  <rect x="25" y="410" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update Status in DB</text>

  <!-- Rejected Path -->
  <line x1="300" y1="460" x2="300" y2="490" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="305" y="480" font-family="Arial, sans-serif" font-size="8">Rejected</text>
  <rect x="225" y="490" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Set as Cancelled</text>

  <!-- Join to Confirm -->
  <line x1="100" y1="450" x2="100" y2="580" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="225" y1="510" x2="175" y2="510" stroke="#334155" stroke-width="1.5" />
  <line x1="175" y1="510" x2="175" y2="580" stroke="#334155" stroke-width="1.5" />

  <!-- System: Send Confirmation -->
  <rect x="25" y="580" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Send Confirmation E-mail</text>
  <line x1="100" y1="620" x2="100" y2="680" stroke="#334155" stroke-width="1.5" />
  <line x1="100" y1="680" x2="425" y2="680" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- User: Notify status -->
  <rect x="425" y="660" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="500" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Notify status</text>
</svg>
