<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="600" height="600" fill="#ffffff" />
  <line x1="200" y1="0" x2="200" y2="600" stroke="#334155" stroke-width="2" />
  <line x1="400" y1="0" x2="400" y2="600" stroke="#334155" stroke-width="2" />
  <rect x="0" y="0" width="600" height="40" fill="#ffffff" stroke="#334155" stroke-width="2" />
  <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">System</text>
  <text x="300" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Inspector</text>
  <text x="500" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Production Batch</text>

  <ellipse cx="300" cy="70" rx="30" ry="15" fill="#64748b" />
  <text x="300" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">Start</text>
  <line x1="300" y1="85" x2="300" y2="110" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="225" y="110" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Scan Batch Label</text>
  <line x1="225" y1="130" x2="160" y2="130" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="25" y="110" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Validate Batch ID</text>
  <line x1="100" y1="150" x2="100" y2="180" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="25" y="180" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Fetch Quality Specs</text>
  <line x1="160" y1="200" x2="225" y2="200" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="225" y="180" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Perform Inspection</text>
  <line x1="300" y1="220" x2="300" y2="250" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <rect x="225" y="250" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Log Defects</text>
  <line x1="225" y1="270" x2="160" y2="270" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <polygon points="100,250 160,280 100,310 40,280" fill="#fef9c3" stroke="#854d0e" stroke-width="1" />
  <text x="100" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Pass?</text>

  <line x1="100" y1="310" x2="100" y2="350" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <text x="105" y="330" font-family="Arial, sans-serif" font-size="8">Yes</text>
  <rect x="25" y="350" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="100" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Update Batch Status</text>
  
  <line x1="175" y1="370" x2="225" y2="370" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <rect x="225" y="350" width="150" height="40" fill="#dcfce7" stroke="#166534" stroke-width="1" />
  <text x="300" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Sync Final Report</text>
</svg>
