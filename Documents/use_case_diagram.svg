<svg width="1000" height="900" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="includeArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="900" fill="#ffffff" />
  
  <!-- System Boundary -->
  <rect x="200" y="80" width="600" height="780" fill="none" stroke="#334155" stroke-width="1" />
  <text x="500" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">Use Case Diagram for LouietexERP System</text>

  <!-- Left Actors -->
  <!-- Employee -->
  <g transform="translate(80, 250)">
    <circle cx="0" cy="-30" r="15" fill="none" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#000" stroke-width="1.5" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="-15" y2="40" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="15" y2="40" stroke="#000" stroke-width="1.5" />
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Employee</text>
  </g>

  <!-- QC Inspector -->
  <g transform="translate(80, 650)">
    <circle cx="0" cy="-30" r="15" fill="none" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#000" stroke-width="1.5" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="-15" y2="40" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="15" y2="40" stroke="#000" stroke-width="1.5" />
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">QC Inspector</text>
  </g>

  <!-- Right Actors -->
  <!-- Admin -->
  <g transform="translate(920, 250)">
    <circle cx="0" cy="-30" r="15" fill="none" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#000" stroke-width="1.5" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="-15" y2="40" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="15" y2="40" stroke="#000" stroke-width="1.5" />
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Admin</text>
  </g>

  <!-- Production Manager -->
  <g transform="translate(920, 650)">
    <circle cx="0" cy="-30" r="15" fill="none" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#000" stroke-width="1.5" />
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="-15" y2="40" stroke="#000" stroke-width="1.5" />
    <line x1="0" y1="15" x2="15" y2="40" stroke="#000" stroke-width="1.5" />
    <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Prod Manager</text>
  </g>

  <!-- Use Cases Inside -->
  <!-- Column Left -->
  <g transform="translate(320, 120)">
    <ellipse cx="0" cy="0" rx="70" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage Profile</text>
    
    <ellipse cx="0" cy="80" rx="70" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">View Dashboard</text>

    <ellipse cx="0" cy="160" rx="70" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Login</text>
    
    <ellipse cx="140" cy="160" rx="60" ry="20" fill="url(#bubbleGrad)" stroke="#334155" stroke-dasharray="4,2" />
    <text x="140" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Register</text>
    <line x1="140" y1="160" x2="70" y2="160" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <text x="105" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="8">&lt;&lt;extend&gt;&gt;</text>

    <ellipse cx="0" cy="240" rx="75" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Password Reset</text>
    
    <ellipse cx="160" cy="240" rx="70" ry="20" fill="url(#bubbleGrad)" stroke="#334155" stroke-dasharray="4,2" />
    <text x="160" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Verify Auth</text>
    <line x1="75" y1="240" x2="90" y2="240" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <text x="115" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8">&lt;&lt;include&gt;&gt;</text>

    <ellipse cx="0" cy="320" rx="70" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Logout</text>

    <!-- QC Specific -->
    <ellipse cx="0" cy="450" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Perform QC Inspection</text>
    
    <ellipse cx="0" cy="530" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Record Fault Details</text>

    <ellipse cx="0" cy="610" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">View Batch History</text>

    <ellipse cx="0" cy="690" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Update QC Status</text>
  </g>

  <!-- Column Right -->
  <g transform="translate(680, 120)">
    <ellipse cx="0" cy="0" rx="80" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage Users</text>
    
    <ellipse cx="0" cy="80" rx="80" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage Employees</text>

    <ellipse cx="0" cy="160" rx="80" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Approve Access</text>

    <ellipse cx="0" cy="240" rx="80" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Generate Reports</text>
    
    <ellipse cx="-130" cy="240" rx="50" ry="20" fill="url(#bubbleGrad)" stroke="#334155" stroke-dasharray="4,2" />
    <text x="-130" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9">Export PDF</text>
    <line x1="-80" y1="240" x2="-95" y2="240" stroke="#64748b" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <text x="-110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8">&lt;&lt;include&gt;&gt;</text>

    <ellipse cx="0" cy="320" rx="80" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage System Settings</text>

    <!-- Production Specific -->
    <ellipse cx="0" cy="450" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage Buyer Orders</text>
    
    <ellipse cx="0" cy="530" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Track Production</text>

    <ellipse cx="0" cy="610" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Assign Prod Lines</text>

    <ellipse cx="0" cy="690" rx="85" ry="25" fill="url(#bubbleGrad)" stroke="#334155" />
    <text y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="11">Manage Inventory</text>
  </g>

  <!-- Association Lines -->
  <!-- Employee (Left Top) -->
  <line x1="100" y1="250" x2="250" y2="120" stroke="#334155" stroke-width="1" /> <!-- Manage Profile -->
  <line x1="100" y1="250" x2="250" y2="200" stroke="#334155" stroke-width="1" /> <!-- View Dashboard -->
  <line x1="100" y1="250" x2="250" y2="280" stroke="#334155" stroke-width="1" /> <!-- Login -->
  <line x1="100" y1="250" x2="245" y2="360" stroke="#334155" stroke-width="1" /> <!-- Password Reset -->
  <line x1="100" y1="250" x2="250" y2="440" stroke="#334155" stroke-width="1" /> <!-- Logout -->

  <!-- QC Inspector (Left Bottom) -->
  <line x1="100" y1="650" x2="235" y2="570" stroke="#334155" stroke-width="1" /> <!-- Perform QC -->
  <line x1="100" y1="650" x2="235" y2="650" stroke="#334155" stroke-width="1" /> <!-- Record Faults -->
  <line x1="100" y1="650" x2="235" y2="730" stroke="#334155" stroke-width="1" /> <!-- View History -->
  <line x1="100" y1="650" x2="235" y2="810" stroke="#334155" stroke-width="1" /> <!-- Update Status -->
  <line x1="100" y1="650" x2="250" y2="280" stroke="#334155" stroke-width="1" /> <!-- Login -->

  <!-- Admin (Right Top) -->
  <line x1="900" y1="250" x2="760" y2="120" stroke="#334155" stroke-width="1" /> <!-- Manage Users -->
  <line x1="900" y1="250" x2="760" y2="200" stroke="#334155" stroke-width="1" /> <!-- Manage Employees -->
  <line x1="900" y1="250" x2="760" y2="280" stroke="#334155" stroke-width="1" /> <!-- Approve Access -->
  <line x1="900" y1="250" x2="760" y2="360" stroke="#334155" stroke-width="1" /> <!-- Generate Reports -->
  <line x1="900" y1="250" x2="760" y2="440" stroke="#334155" stroke-width="1" /> <!-- Manage Settings -->
  <line x1="900" y1="250" x2="390" y2="280" stroke="#334155" stroke-width="1" /> <!-- Login -->

  <!-- Production Manager (Right Bottom) -->
  <line x1="900" y1="650" x2="765" y2="570" stroke="#334155" stroke-width="1" /> <!-- Manage Orders -->
  <line x1="900" y1="650" x2="765" y2="650" stroke="#334155" stroke-width="1" /> <!-- Track Production -->
  <line x1="900" y1="650" x2="765" y2="730" stroke="#334155" stroke-width="1" /> <!-- Assign Lines -->
  <line x1="900" y1="650" x2="765" y2="810" stroke="#334155" stroke-width="1" /> <!-- Manage Inventory -->
  <line x1="900" y1="650" x2="390" y2="280" stroke="#334155" stroke-width="1" /> <!-- Login -->

</svg>
