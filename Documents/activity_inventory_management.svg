<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>
  <rect width="400" height="600" fill="#ffffff" />
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Activity: Inventory Management</text>
  
  <circle cx="200" cy="70" r="10" fill="#1e293b" />
  <line x1="200" y1="80" x2="200" y2="110" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <rect x="125" y="110" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">View Stock Levels</text>
  <line x1="200" y1="150" x2="200" y2="180" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <polygon points="200,180 250,210 200,240 150,210" fill="#f8fafc" stroke="#334155" stroke-width="2" />
  <text x="200" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e293b">Stock Low?</text>
  
  <line x1="250" y1="210" x2="320" y2="210" stroke="#334155" stroke-width="2" />
  <line x1="320" y1="210" x2="320" y2="260" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="260" y="260" width="120" height="40" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
  <text x="320" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">Alert Admin</text>
  
  <line x1="150" y1="210" x2="80" y2="210" stroke="#334155" stroke-width="2" />
  <line x1="80" y1="210" x2="80" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <line x1="320" y1="300" x2="320" y2="340" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="125" y="340" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Update Inventory Count</text>
  
  <line x1="200" y1="380" x2="200" y2="410" stroke="#334155" stroke-width="2" marker-end="url(#arrowhead)" />
  <rect x="125" y="410" width="150" height="40" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2" />
  <text x="200" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">Save Stock Adjustment</text>
  
  <circle cx="200" cy="500" r="15" fill="none" stroke="#1e293b" stroke-width="2" />
  <circle cx="200" cy="500" r="10" fill="#1e293b" />
</svg>
